# ============================================================
# Bluetooth
# ============================================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y          # Peripheral役割 (ADV送信・接続受け入れ)
CONFIG_BT_CENTRAL=y             # Central役割 (Scan・接続開始)
CONFIG_BT_DEVICE_NAME="nRF52840_BLE"
CONFIG_BT_DEVICE_APPEARANCE=0

# 最大接続数・ペアリング数
CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=2

# SMP (ペアリング/セキュリティ)
CONFIG_BT_SMP=y

# GATT
CONFIG_BT_GATT_CLIENT=y

# ============================================================
# GPIO
# ============================================================
CONFIG_GPIO=y

# ============================================================
# Logging
# ============================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3      # INF

# ============================================================
# System
# ============================================================
CONFIG_MAIN_STACK_SIZE=2048
